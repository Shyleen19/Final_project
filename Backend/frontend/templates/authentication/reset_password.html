{% extends 'base.html' %}
{% load static %}

{% block title %} Reset password {% endblock %}

{% block content %}

Please enter an email below to reset your password.

    <form>
        {% csrf_token %}
        <input type="email" name="email" id="email" required> <br><br>
        <input type="submit" value="Send Email" id="submit" name="submit">
    </form>

    <script type="module" src="{% static 'js/reset_password.js' %}"></script>
{% endblock %}
